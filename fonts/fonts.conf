<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Include system fonts as fallback -->
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>
  <include ignore_missing="yes">/usr/share/fonts</include>
  <include ignore_missing="yes">/usr/local/share/fonts</include>

  <!-- Add our custom fonts directory -->
  <dir>.</dir>

  <!-- Cache directory -->
  <cachedir>/tmp/fontconfig-cache</cachedir>

  <!-- Default fallback for sans-serif -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>PlusJakartaSans</family>
    </prefer>
  </alias>
</fontconfig>
